<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>3D Vertical Wheel Menu</title>

    <link rel="stylesheet" href="style.css">

    <!-- GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>




    <style>
        /* ==========================
   RESET
========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
}

body{

    font-family:Arial, Helvetica, sans-serif;

    background:#050505;

    color:#fff;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

}


/* ==========================
   BACKGROUND
========================== */

.bg-glow{

    position:fixed;

    inset:0;

    background:
    radial-gradient(circle at center,
    rgba(255,255,255,.08),
    transparent 60%);

    pointer-events:none;

}

.noise{

    position:fixed;

    inset:0;

    opacity:.05;

    pointer-events:none;

}


/* ==========================
   SECTION
========================== */

.wheel-section{

    width:100vw;

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}


/* ==========================
   3D PERSPECTIVE
========================== */

.wheel-perspective{

    width:700px;

    height:700px;

    perspective:1800px;

    display:flex;

    justify-content:center;

    align-items:center;

}


/* ==========================
   WHEEL
========================== */

#wheel{

    position:relative;

    width:420px;

    height:420px;

    transform-style:preserve-3d;

}


/* ==========================
   ITEMS
========================== */

.wheel-item{

    position:absolute;

    left:50%;
    top:50%;

    width:100%;

    transform-style:preserve-3d;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    user-select:none;

    cursor:grab;

    transition:

    opacity .3s,

    filter .3s,

    color .3s;

}


/* Active Cursor */

.wheel-item:active{

    cursor:grabbing;

}


/* ==========================
   NUMBER
========================== */

.number{

    font-size:.85rem;

    letter-spacing:8px;

    color:#8f8f8f;

    margin-bottom:12px;

    text-transform:uppercase;

}


/* ==========================
   TITLE
========================== */

.wheel-item h1{

    font-size:72px;

    font-weight:700;

    letter-spacing:8px;

    text-transform:uppercase;

    white-space:nowrap;

}


/* ==========================
   ACTIVE ITEM
========================== */

.wheel-item.active{

    color:#ffffff;

}


/* ==========================
   INACTIVE
========================== */

.wheel-item:not(.active){

    color:#6b6b6b;

}


/* ==========================
   CURSOR
========================== */

#cursor{

    position:fixed;

    left:0;
    top:0;

    pointer-events:none;

    z-index:9999;

}

.cursor-ring{

    width:40px;

    height:40px;

    border:1px solid rgba(255,255,255,.35);

    border-radius:50%;

    transform:translate(-50%,-50%);

}

.cursor-dot{

    position:absolute;

    left:50%;
    top:50%;

    width:6px;

    height:6px;

    background:white;

    border-radius:50%;

    transform:translate(-50%,-50%);

}


/* ==========================
   INSTRUCTIONS
========================== */

.instructions{

    position:fixed;

    top:50%;

    transform:translateY(-50%) rotate(-90deg);

    font-size:12px;

    letter-spacing:6px;

    color:#555;

    user-select:none;

}

.left{

    left:40px;

}

.right{

    right:40px;

}


/* ==========================
   SIDE LINES
========================== */

.side-line{

    position:fixed;

    top:0;

    width:1px;

    height:100vh;

    background:

    linear-gradient(

    transparent,

    rgba(255,255,255,.15),

    transparent

    );

}

.left-line{

    left:80px;

}

.right-line{

    right:80px;

}


/* ==========================
   BACKGROUND WORD
========================== */

.bg-text{

    position:fixed;

    left:50%;

    top:50%;

    transform:translate(-50%,-50%);

    font-size:14vw;

    font-weight:900;

    color:rgba(255,255,255,.025);

    letter-spacing:15px;

    user-select:none;

    pointer-events:none;

}


/* ==========================
   RESPONSIVE
========================== */

@media(max-width:900px){

    .wheel-perspective{

        width:100vw;

        height:100vw;

    }

    .wheel-item h1{

        font-size:48px;

    }

}

@media(max-width:600px){

    .wheel-item h1{

        font-size:34px;

        letter-spacing:4px;

    }

    .number{

        font-size:.7rem;

        letter-spacing:4px;

    }

    .instructions{

        display:none;

    }

    .left-line,
    .right-line{

        display:none;

    }

}

/* ===========================================
   PART 2B
   Premium Effects & Finishing
=========================================== */


/* ---------- Wheel ---------- */

#wheel{
    transform-style:preserve-3d;
    will-change:transform;
}


/* ---------- Item ---------- */

.wheel-item{

    transform-origin:center center;

    backface-visibility:hidden;

    -webkit-font-smoothing:antialiased;

    will-change:
        transform,
        opacity,
        filter;

    transition:
        transform .25s ease,
        opacity .25s ease,
        filter .25s ease,
        color .25s ease,
        text-shadow .25s ease;

}


/* ---------- Glow Behind Active ---------- */

.wheel-item::before{

    content:"";

    position:absolute;

    width:130%;

    height:130%;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    background:
    radial-gradient(circle,
    rgba(255,255,255,.16),
    rgba(255,255,255,.03),
    transparent 75%);

    opacity:0;

    filter:blur(40px);

    transition:.35s;

    z-index:-1;

}

.wheel-item.active::before{

    opacity:1;

}


/* ---------- Active ---------- */

.wheel-item.active{

    color:#ffffff;

    filter:blur(0px);

    text-shadow:

    0 0 12px rgba(255,255,255,.25),

    0 0 40px rgba(255,255,255,.18);

}


/* ---------- Inactive ---------- */

.wheel-item:not(.active){

    opacity:.45;

    filter:blur(2px);

}


/* ---------- Number ---------- */

.number{

    transition:.3s;

}

.wheel-item.active .number{

    color:white;

    letter-spacing:10px;

}

.wheel-item:not(.active) .number{

    color:#666;

}


/* ---------- Title ---------- */

.wheel-item h1{

    transition:

    transform .3s,

    letter-spacing .3s,

    color .3s;

}

.wheel-item.active h1{

    transform:scale(1.08);

    letter-spacing:10px;

}

.wheel-item:not(.active) h1{

    transform:scale(.88);

}


/* ---------- Cursor ---------- */

.cursor-ring{

    transition:

    width .3s,

    height .3s,

    border-color .3s,

    transform .08s linear;

}

.cursor-dot{

    transition:

    transform .08s linear;

}

body.dragging .cursor-ring{

    width:70px;

    height:70px;

    border-color:white;

}


/* ---------- Background Glow ---------- */

.bg-glow{

    animation:
    glowFloat 8s ease-in-out infinite;

}


/* ---------- Background Text ---------- */

.bg-text{

    animation:
    floatWord 10s ease-in-out infinite;

}


/* ---------- Instructions ---------- */

.instructions{

    opacity:.45;

    transition:.3s;

}

.instructions:hover{

    opacity:1;

}


/* ---------- Side Lines ---------- */

.side-line{

    opacity:.18;

}


/* ---------- Scroll Hint ---------- */

.instructions::after{

    content:"";

    display:block;

    width:50px;

    height:1px;

    background:#666;

    margin-top:12px;

}


/* ---------- Selection ---------- */

::selection{

    background:white;

    color:black;

}


/* ---------- Scrollbar ---------- */

::-webkit-scrollbar{

    width:0;

}


/* ===========================================
   Animations
=========================================== */

@keyframes glowFloat{

    0%{

        transform:scale(1);

        opacity:.8;

    }

    50%{

        transform:scale(1.15);

        opacity:1;

    }

    100%{

        transform:scale(1);

        opacity:.8;

    }

}


@keyframes floatWord{

    0%{

        transform:
        translate(-50%,-50%)
        translateY(0px);

    }

    50%{

        transform:
        translate(-50%,-50%)
        translateY(-18px);

    }

    100%{

        transform:
        translate(-50%,-50%)
        translateY(0px);

    }

}


/* ===========================================
   Large Screens
=========================================== */

@media(min-width:1700px){

    .wheel-item h1{

        font-size:90px;

    }

}


/* ===========================================
   Tablets
=========================================== */

@media(max-width:900px){

    .bg-text{

        font-size:22vw;

    }

}


/* ===========================================
   Phones
=========================================== */

@media(max-width:600px){

    #wheel{

        width:320px;

        height:320px;

    }

    .wheel-item{

        width:320px;

    }

    .wheel-item h1{

        font-size:36px;

    }

    .wheel-item.active h1{

        transform:scale(1);

    }

    .bg-text{

        display:none;

    }

}


/* ===========================================
   Performance
=========================================== */

.wheel-item,
#wheel,
.bg-glow{

    transform:translateZ(0);

}

html{

    -webkit-font-smoothing:antialiased;

    text-rendering:optimizeLegibility;

}
    </style>
</head>

<body>

    <!-- Background Glow -->
    <div class="bg-glow"></div>

    <!-- Noise -->
    <div class="noise"></div>

    <!-- Instructions -->
    <div class="instructions left">
        DRAG TO SPIN
    </div>

    <div class="instructions right">
        RELEASE TO STOP
    </div>

    <!-- Wheel Container -->
    <section class="wheel-section">

        <div class="wheel-perspective">

            <div id="wheel">

                <div class="wheel-item active">
                    <span class="number">01</span>
                    <h1>HOME</h1>
                </div>

                <div class="wheel-item">
                    <span class="number">02</span>
                    <h1>ABOUT</h1>
                </div>

                <div class="wheel-item">
                    <span class="number">03</span>
                    <h1>SERVICES</h1>
                </div>

                <div class="wheel-item">
                    <span class="number">04</span>
                    <h1>WORK</h1>
                </div>

                <div class="wheel-item">
                    <span class="number">05</span>
                    <h1>TEAM</h1>
                </div>

                <div class="wheel-item">
                    <span class="number">06</span>
                    <h1>BLOG</h1>
                </div>

                <div class="wheel-item">
                    <span class="number">07</span>
                    <h1>CONTACT</h1>
                </div>

            </div>

        </div>

    </section>

    <!-- Cursor -->
    <div id="cursor">

        <div class="cursor-ring"></div>
        <div class="cursor-dot"></div>

    </div>

    <!-- Side Decoration -->

    <div class="side-line left-line"></div>
    <div class="side-line right-line"></div>

    <!-- Large Background Text -->

    <div class="bg-text">
        WORK
    </div>

    <script>
        const wheel = document.querySelector("#wheel");
const items = [...document.querySelectorAll(".wheel-item")];

const total = items.length;

const radius = 260;
const step = 360 / total;

let rotation = 0;

let velocity = 0;

let isDragging = false;

let startY = 0;
let lastY = 0;

let cursor = document.querySelector("#cursor");
let ring = document.querySelector(".cursor-ring");



function render() {

    let closestIndex = 0;
    let smallestDistance = 999999;

    items.forEach((item, i) => {

        const angle = (i * step) + rotation;

        const normalized =
            ((angle % 360) + 360) % 360;

        const rad = angle * Math.PI / 180;

        const y =
            Math.sin(rad) * radius;

        const z =
            Math.cos(rad) * radius;

        const depth =
            (z + radius) / (radius * 2);

        const scale =
            0.5 + depth * 0.8;

        const opacity =
            0.15 + depth * 0.85;

        const blur =
            (1 - depth) * 8;

        gsap.set(item, {

            yPercent: -50,

            xPercent: -50,

            y,

            z,

            scale,

            opacity,

            filter: `blur(${blur}px)`,

            transformPerspective: 1500

        });

        const dist =
            Math.abs(normalized);

        const alt =
            Math.abs(normalized - 360);

        const d =
            Math.min(dist, alt);

        if (d < smallestDistance) {

            smallestDistance = d;
            closestIndex = i;

        }

    });

    items.forEach(el =>
        el.classList.remove("active")
    );

    items[closestIndex]
        .classList.add("active");

}


render();



gsap.ticker.add(() => {

    rotation += velocity;

    velocity *= 0.95;

    render();

});



window.addEventListener("mousemove", e => {

    gsap.to(cursor, {

        x: e.clientX,
        y: e.clientY,

        duration: 0.15

    });

});



wheel.addEventListener("mousedown", e => {

    isDragging = true;

    startY = e.clientY;

    lastY = e.clientY;

    document.body.classList.add("dragging");

});



window.addEventListener("mousemove", e => {

    if (!isDragging) return;

    const delta =
        e.clientY - lastY;

    rotation += delta * 0.4;

    velocity = delta * 0.12;

    lastY = e.clientY;

});



window.addEventListener("mouseup", () => {

    isDragging = false;

    document.body.classList.remove("dragging");

});



wheel.addEventListener(
    "touchstart",
    e => {

        isDragging = true;

        startY =
            e.touches[0].clientY;

        lastY =
            e.touches[0].clientY;

    },
    { passive: true }
);



window.addEventListener(
    "touchmove",
    e => {

        if (!isDragging) return;

        const current =
            e.touches[0].clientY;

        const delta =
            current - lastY;

        rotation += delta * 0.4;

        velocity = delta * 0.12;

        lastY = current;

    },
    { passive: true }
);



window.addEventListener(
    "touchend",
    () => {

        isDragging = false;

    }
);



window.addEventListener(
    "wheel",
    e => {

        velocity +=
            e.deltaY * 0.0015;

    },
    { passive: true }
);

/* ==========================================
   PART 3B
========================================== */

const bgText = document.querySelector(".bg-text");

function updateCenterText() {
    const active = document.querySelector(".wheel-item.active");

    if (!active) return;

    const title = active.querySelector("h1").textContent;

    if (bgText.textContent !== title) {

        gsap.to(bgText, {

            opacity: 0,
            duration: 0.15,

            onComplete() {

                bgText.textContent = title;

                gsap.to(bgText, {

                    opacity: 1,
                    duration: 0.3

                });

            }

        });

    }

}



/* ---------- Better Physics ---------- */

gsap.ticker.add(() => {

    velocity *= 0.94;

    if (Math.abs(velocity) < 0.0001)
        velocity = 0;

    updateCenterText();

});



/* ---------- Keyboard ---------- */

window.addEventListener("keydown", e => {

    if (e.key === "ArrowDown") {

        velocity += 1.5;

    }

    if (e.key === "ArrowUp") {

        velocity -= 1.5;

    }

});



/* ---------- Mouse Leave ---------- */

window.addEventListener("mouseleave", () => {

    isDragging = false;

});



/* ---------- Snap ---------- */

function snapWheel() {

    const nearest =
        Math.round(rotation / step);

    const target =
        nearest * step;

    gsap.to({}, {

        duration: 0.6,

        ease: "power3.out",

        onUpdate() {

            rotation += (target - rotation) * 0.12;

        }

    });

}



window.addEventListener("mouseup", () => {

    setTimeout(() => {

        if (Math.abs(velocity) < 0.2)
            snapWheel();

    }, 150);

});



window.addEventListener("touchend", () => {

    setTimeout(() => {

        if (Math.abs(velocity) < 0.2)
            snapWheel();

    }, 150);

});



/* ---------- Double Click ---------- */

wheel.addEventListener("dblclick", () => {

    gsap.to({}, {

        duration: 1.2,

        ease: "expo.out",

        onUpdate() {

            rotation += (0 - rotation) * 0.08;

        }

    });

});



/* ---------- Resize ---------- */

window.addEventListener("resize", () => {

    render();

});



/* ---------- Initial Animation ---------- */

gsap.from(".wheel-item", {

    duration: 1.2,

    opacity: 0,

    scale: 0.4,

    stagger: 0.08,

    ease: "expo.out"

});



gsap.from(".instructions", {

    x: -50,

    opacity: 0,

    duration: 1,

    stagger: 0.2

});



gsap.from(".bg-text", {

    scale: 1.3,

    opacity: 0,

    duration: 2,

    ease: "power4.out"

});



/* ---------- Cursor Hover ---------- */

items.forEach(item => {

    item.addEventListener("mouseenter", () => {

        gsap.to(".cursor-ring", {

            width: 70,
            height: 70,

            duration: 0.25

        });

    });

    item.addEventListener("mouseleave", () => {

        gsap.to(".cursor-ring", {

            width: 40,
            height: 40,

            duration: 0.25

        });

    });

});



/* ---------- Idle Float ---------- */

let float = 0;

gsap.ticker.add(() => {

    float += 0.02;

    gsap.set(wheel, {

        y: Math.sin(float) * 8

    });

});



/* ---------- Prevent Image Drag ---------- */

document.querySelectorAll("img").forEach(img => {

    img.draggable = false;

});



/* ---------- Infinite Rotation ---------- */

gsap.ticker.add(() => {

    if (rotation > 360000)
        rotation -= 360000;

    if (rotation < -360000)
        rotation += 360000;

});



/* ---------- Intro Spin ---------- */

gsap.fromTo(

    { value: -180 },

    { value: 0,

        duration: 2,

        ease: "expo.out",

        onUpdate() {

            rotation = this.targets()[0].value;

            render();

        }

    }

);



/* ---------- Smooth Rendering ---------- */

render();
    </script>

</body>

</html>
